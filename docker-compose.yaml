services:
  redis:
    image: redis:7-alpine
    container_name: battleships-redis
    ports:
      - "6379:6379"
    networks:
      - battleships-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: battleships-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - battleships-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: battleships-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - battleships-network
    restart: unless-stopped

networks:
  battleships-network:
    driver: bridge
