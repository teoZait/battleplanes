apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: battleplanes
  labels:
    app: battleplanes
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: battleplanes
      component: frontend
  template:
    metadata:
      labels:
        app: battleplanes
        component: frontend
    spec:
      containers:
      - name: frontend
        image: REGION-docker.pkg.dev/PROJECT_ID/battleplanes/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: battleplanes
  labels:
    app: battleplanes
    component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: battleplanes
    component: frontend
