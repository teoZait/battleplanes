# Blue-green production deployment.
# Usage: docker compose -f docker-compose.prod.yaml up -d
#
# Requires .env with: REDIS_PASSWORD, CORS_ALLOWED_ORIGINS,
#                      GRAFANA_ADMIN_PASSWORD (optional)
#
# Use deploy-blue-green.sh to perform zero-downtime deploys.

x-backend: &backend-base
  build:
    context: ./backend
    dockerfile: Dockerfile
  environment:
    - PYTHONUNBUFFERED=1
    - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
  depends_on:
    redis:
      condition: service_healthy
  networks:
    - battleplanes-network
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 10s

x-frontend: &frontend-base
  build:
    context: ./frontend
    dockerfile: Dockerfile
    args:
      NGINX_CONF: nginx.prod.conf
  networks:
    - battleplanes-network
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/ || exit 1"]
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 10s

services:
  redis:
    image: redis:7-alpine
    container_name: battleplanes-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --save 300 100
    volumes:
      - redis_data:/data
    networks:
      - battleplanes-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx-proxy:
    image: nginx:alpine
    container_name: battleplanes-proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/active.conf:/etc/nginx/conf.d/default.conf
    networks:
      - battleplanes-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend-blue:
    <<: *backend-base
    container_name: battleplanes-backend-blue

  backend-green:
    <<: *backend-base
    container_name: battleplanes-backend-green

  frontend-blue:
    <<: *frontend-base
    container_name: battleplanes-frontend-blue

  frontend-green:
    <<: *frontend-base
    container_name: battleplanes-frontend-green

  prometheus:
    image: prom/prometheus:latest
    container_name: battleplanes-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - battleplanes-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: battleplanes-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-http://localhost:9/no-op}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - battleplanes-network
    restart: unless-stopped

networks:
  battleplanes-network:
    driver: bridge

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
