apiVersion: 1
contactPoints:
  - orgId: 1
    name: slack
    receivers:
      - uid: slack-webhook
        type: webhook
        disableResolveMessage: false
        settings:
          url: $SLACK_WEBHOOK_URL
          httpMethod: POST
          title: |
            {{ if eq .Status "firing" }}ALERT{{ else }}RESOLVED{{ end }}: {{ .CommonLabels.alertname }}
          message: |
            {{ range .Alerts }}
            {{ .Annotations.summary }}
            {{ end }}
